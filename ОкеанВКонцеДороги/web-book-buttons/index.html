<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Glass Button</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="button-wrap">
  <div class="side-frame" aria-hidden="true"></div>

  <div class="button">
    <canvas id="gl"></canvas>
    <div class="big-shell" aria-hidden="true">
      <img class="big-shell-base" src="./svg/big-shell.svg" alt="">
      <div class="big-shell-gold"></div>
      <div class="big-shell-shimmer"></div>
    </div>
    <img class="decor-lines" src="./svg/decorative-lines.svg" alt="" aria-hidden="true">

    <div class="border border-1"></div>
    <div class="border border-2"></div>

    <span class="text">Начать историю</span>
  </div>
</div>

<div class="round-button-wrap">
  <div class="round-glow" aria-hidden="true"></div>
  <div class="round-button">
    <div class="round-bubble" aria-hidden="true"></div>
    <div class="round-grad-dotted" aria-hidden="true"></div>
    <img class="round-frame" src="./svg/decorative frame.svg" alt="" aria-hidden="true">
    <div class="round-gold-border" aria-hidden="true"></div>
    <div class="round-shell" aria-hidden="true">
      <img class="round-shell-base" src="./svg/small-shell.svg" alt="">
      <div class="round-shell-gold"></div>
    </div>
    <img class="round-lines" src="./svg/small-lines.svg" alt="" aria-hidden="true">
    <span class="round-text">Меню</span>
  </div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
