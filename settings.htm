<div class="settings-container">

    <div class="settings-title-wrap">
        <video src="video/settings.webm" class="settings-title-svg" autoplay loop muted playsinline></video>
    </div>

    <div class="settings-group">

	<label class="hex-toggle">
	  <span>Движение анимации</span>
	  <input type="checkbox" id="toggle-animation" checked>

	  <div class="hex">
		<div class="inner-line"></div>
		<div class="diamond" style="--shimmer-delay: 0s"></div>
	  </div>
	</label>

	<label class="hex-toggle">
	  <span>Версия для слабовидящих</span>
	  <input type="checkbox" id="toggle-a11y">

	  <div class="hex">
		<div class="inner-line"></div>
		<div class="diamond" style="--shimmer-delay: 1.4s"></div>
	  </div>
	</label>
		
	<label class="hex-toggle">
	  <span>Подсказки</span>
	  <input type="checkbox" id="toggle-hints" checked>

	  <div class="hex">
		<div class="inner-line"></div>
		<div class="diamond" style="--shimmer-delay: 2.8s"></div>
	  </div>
	</label>

	<div class="hex-slider">
	  <label>Звуки</label>

	  <div class="slider-wrap">
		<div class="slider-track"></div>
		<input type="range" min="0" max="100" value="70" id="slider-sounds">
		<div class="fill"></div>
	  </div>
	</div>

	<div class="hex-slider">
	  <label>Фоновая музыка</label>

	  <div class="slider-wrap">
		<div class="slider-track"></div>
		<input type="range" min="0" max="100" value="70" id="slider-music">
		<div class="fill"></div>
	  </div>
	</div>

</div>

<div class="button-wrap btn-save">
<div class="button">
  <canvas class="btn-canvas"></canvas>
  <div class="border border-1"></div>
  <span class="text">Сохранить</span>
</div>
</div>

<script src="settings.js"></script>
<script src="continue-reading.js"></script>
<script src="ripple.js"></script>
<script src="audio.js"></script>

</body>
</html>
