
<style>
  .scene {
    position: relative;
    width: 100%;
    height: 480px;
    overflow: hidden;
    background: #4a6fa5;
    border-radius: var(--border-radius-lg);
  }
  .bubble { position: absolute; }
  @keyframes drift {
    0%   { top: 110%; }
    100% { top: -16%; }
  }
</style>
<div class="scene" id="scene"></div>
<script>
const scene = document.getElementById('scene');
function rand(a,b){ return Math.random()*(b-a)+a; }
function ease(t){ return t<.5?2*t*t:-1+(4-2*t)*t; }

function makeBlob(cx, cy, rx, ry, opts) {
  const sx = opts.squishX||0, sy = opts.squishY||0;
  const lx = opts.leanX||0,   ly = opts.leanY||0;
  const top    = [cx + rand(-rx*.18,rx*.18)+lx*.4,  cy - ry*(1+sy)+rand(-ry*.12,ry*.12)];
  const right  = [cx + rx*(1+sx)+rand(-rx*.1,rx*.1)+lx, cy + rand(-ry*.18,ry*.18)+ly*.3];
  const bottom = [cx + rand(-rx*.18,rx*.18)+lx*.4,  cy + ry*(1+sy)+rand(-ry*.12,ry*.12)];
  const left   = [cx - rx*(1+sx)+rand(-rx*.1,rx*.1)+lx, cy + rand(-ry*.18,ry*.18)+ly*.3];
  const hx = rx*(0.58+rand(-.08,.08)), hy = ry*(0.58+rand(-.08,.08));
  const hx2= rx*(0.58+rand(-.08,.08)), hy2= ry*(0.58+rand(-.08,.08));
  const f = n=>n.toFixed(2);
  return [
    `M ${f(top[0])} ${f(top[1])}`,
    `C ${f(top[0]+hx+lx*.2)} ${f(top[1]+rand(-ry*.1,ry*.1))}, ${f(right[0]+rand(-rx*.1,rx*.1))} ${f(right[1]-hy2)}, ${f(right[0])} ${f(right[1])}`,
    `C ${f(right[0]+rand(-rx*.08,rx*.08))} ${f(right[1]+hy2)}, ${f(bottom[0]+hx+lx*.2)} ${f(bottom[1]+rand(-ry*.1,ry*.1))}, ${f(bottom[0])} ${f(bottom[1])}`,
    `C ${f(bottom[0]-hx2+lx*.1)} ${f(bottom[1]+rand(-ry*.1,ry*.1))}, ${f(left[0]+rand(-rx*.08,rx*.08))} ${f(left[1]+hy)}, ${f(left[0])} ${f(left[1])}`,
    `C ${f(left[0]+rand(-rx*.08,rx*.08))} ${f(left[1]-hy)}, ${f(top[0]-hx2+lx*.1)} ${f(top[1]+rand(-ry*.1,ry*.1))}, ${f(top[0])} ${f(top[1])}`,
    'Z'
  ].join(' ');
}

function interpolatePath(a, b, t) {
  const nA = a.match(/-?\d+\.?\d*/g).map(Number);
  const nB = b.match(/-?\d+\.?\d*/g).map(Number);
  let idx = 0;
  return a.replace(/-?\d+\.?\d*/g, () => (nA[idx]+(nB[idx]-nA[idx])*t).toFixed(2) + (()=>{idx++;return '';})());
}

function getOpts(t, timeOffset, rx, ry) {
  return {
    squishX: Math.sin(t*1.3+timeOffset)*0.13,
    squishY: Math.cos(t*0.9+timeOffset)*0.10,
    leanX:   Math.sin(t*0.7+timeOffset*1.4)*rx*0.22,
    leanY:   Math.cos(t*1.1+timeOffset*0.8)*ry*0.10,
  };
}

function animateBubble(pathEl, cx, cy, rx, ry) {
  const timeOffset = rand(0, Math.PI*2);
  let totalT = rand(0, 100);
  let lastTs = null;

  // current and target shapes — target is always computed fresh
  // current starts as wherever we are, no jump
  let shapeFrom = makeBlob(cx, cy, rx, ry, getOpts(totalT, timeOffset, rx, ry));
  let shapeTo   = makeBlob(cx, cy, rx, ry, getOpts(totalT + rand(1,2), timeOffset, rx, ry));
  pathEl.setAttribute('d', shapeFrom);

  let morphStart = null;
  let morphDur = rand(2000, 4000);

  function step(ts) {
    if (!lastTs) lastTs = ts;
    const dt = (ts - lastTs) / 1000;
    lastTs = ts;
    totalT += dt;

    if (!morphStart) morphStart = ts;
    const p = Math.min((ts - morphStart) / morphDur, 1);
    const e = ease(p);

    pathEl.setAttribute('d', interpolatePath(shapeFrom, shapeTo, e));

    if (p >= 1) {
      // key fix: shapeFrom = exact current rendered endpoint (= shapeTo), no jump
      shapeFrom = shapeTo;
      shapeTo = makeBlob(cx, cy, rx, ry, getOpts(totalT + rand(1,2), timeOffset, rx, ry));
      morphStart = ts;
      morphDur = rand(2000, 4000);
    }

    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

for (let i = 0; i < 22; i++) {
  const w = rand(20, 70);
  const h = w * rand(0.72, 1.28);
  const pad = 30;
  const boxW = w+pad, boxH = h+pad;
  const cx = boxW/2, cy = boxH/2;
  const rx = w/2,    ry = h/2;

  const wrapper = document.createElement('div');
  wrapper.className = 'bubble';
  wrapper.style.cssText = `
    left:${rand(1,93)}%;
    top:${rand(0,110)}%;
    width:${boxW}px;height:${boxH}px;
    opacity:${rand(0.5,1).toFixed(2)};
    animation:drift ${rand(10,26)}s linear ${(-rand(0,26)).toFixed(1)}s infinite;
  `;

  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns,'svg');
  svg.setAttribute('width',boxW); svg.setAttribute('height',boxH);
  svg.setAttribute('viewBox',`0 0 ${boxW} ${boxH}`);
  svg.style.overflow='visible';

  const path = document.createElementNS(ns,'path');
  path.setAttribute('fill','none');
  path.setAttribute('stroke','rgba(255,255,255,0.88)');
  path.setAttribute('stroke-width', rand(1.5,3).toFixed(1));
  path.setAttribute('stroke-linejoin','round');
  path.setAttribute('stroke-linecap','round');

  svg.appendChild(path); wrapper.appendChild(svg); scene.appendChild(wrapper);
  animateBubble(path, cx, cy, rx, ry);
}
</script>
